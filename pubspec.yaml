name: ai_vision_pro
description: AI Powered assistive app for blind users with real-time object detection, OCR and voice commands.
publish_to: 'none'

version: 1.4.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Hardware & Permissions
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  vibration: ^3.1.8
  device_info_plus: ^13.0.0

  # Voice, Speech & Audio
  flutter_tts: ^4.0.2
  speech_to_text: ^7.3.0
  audioplayers: ^6.6.0

  # AI & Machine Learning (Google ML Kit)
  google_mlkit_image_labeling: ^0.14.0
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_text_recognition: ^0.15.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo/ai_vision_pro_logo.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/models/labels.txt